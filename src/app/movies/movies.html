<div>
  <table class="table table-bordered table-striped mt-3">
    <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Título</th>
        <th scope="col">Synopsis</th>
        <th scope="col">Año</th>
        <th scope="col">Cover</th>
        <th scope="col">Trailer</th>
        <th scope="col">Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let movie of movies">

        <td>{{ movie.id }}</td>
        <td>

          <a [routerLink]="['/movies', movie.id]" class="text-decoration-none fw-bold">
            {{ movie.title }}
          </a>

        </td>
        <td>{{ movie.synopsis }}</td>
        <td>{{ movie.year }}</td>
        <td><img [src]="movie.cover" alt="{{ movie.title }}" width="80"></td>
        <td>
          <a [href]="movie.trailer" target="_blank">
            Ver Trailer
          </a>
        </td>
        <td>
          <a [routerLink]="['/edit-movie', movie.id]" class="btn btn-warning btn-sm me-2">
            Editar
          </a>
        </td>
        <td>
          <button class="btn btn-danger btn-sm" (click)="deleteMovie(movie.id!)">
            Eliminar
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
