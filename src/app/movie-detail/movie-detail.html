<div *ngIf="movie" class="card p-4">

  <h2 class="mb-3">
    {{ movie.title }}
  </h2>

  <img
    [src]="movie.cover"
    [alt]="movie.title"
    class="img-fluid mb-3"
    width="250"
  >

  <p>
    <strong>Sinopsis:</strong>
    {{ movie.synopsis }}
  </p>

  <p>
    <strong>Año:</strong>
    {{ movie.year }}
  </p>

  <div class="mt-3">

    <a
      [routerLink]="['/edit-movie', movie.id]"
      class="btn btn-warning me-2"
    >
      Editar
    </a>

    <button
      class="btn btn-danger me-2"
      (click)="deleteMovie(movie.id!)"
    >
      Eliminar
    </button>

    <a
      routerLink="/movies"
      class="btn btn-secondary"
    >
      Regresar
    </a>

  </div>

</div>
